apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.deployments.kedaAddOnsHttpInterceptor.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.deployments.kedaAddOnsHttpInterceptor.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.deployments.kedaAddOnsHttpInterceptor.name }}
    spec:
      containers:
        - name: {{ .Values.deployments.kedaAddOnsHttpInterceptor.containerName }}
          image: {{ .Values.deployments.kedaAddOnsHttpInterceptor.image }}
          resources:
{{ toYaml .Values.deployments.kedaAddOnsHttpInterceptor.resources | indent 12 }}
