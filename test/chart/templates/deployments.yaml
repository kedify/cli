apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.deployments.kedaOperator.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.deployments.kedaOperator.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.deployments.kedaOperator.name }}
    spec:
      containers:
{{- range $container := .Values.deployments.kedaOperator.containers }}
        - name: {{ $container.name }}
          image: {{ $container.image }}
          resources:
{{ toYaml $container.resources | indent 12 }}
{{- end }}
