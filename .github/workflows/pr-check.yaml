name: PR Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write
  security-events: write
  actions: read

jobs:
  pr-check:
    uses: kedify/github-meta/.github/workflows/go-pr-check.yaml@main
    with:
      skip_private_key_setup: true
      continue_on_error: false
